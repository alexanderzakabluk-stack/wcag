<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Brand dark background -->
  <rect width="32" height="32" rx="5" fill="#0d0c11"/>
  <!-- Track ring -->
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2.8"/>
  <!-- Score arc ~78% filled, green -->
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="#ffffff" stroke-width="2.8"
    stroke-dasharray="65.97" stroke-dashoffset="14.51"
    stroke-linecap="round"
    transform="rotate(-90 16 16)"/>
  <!-- Bold score number -->
  <text x="16" y="20.5" text-anchor="middle"
    font-family="Helvetica,Arial,sans-serif"
    font-size="10" font-weight="800" fill="#ffffff" letter-spacing="-0.5">W</text>
</svg>
